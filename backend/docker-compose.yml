services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: smartrag
      POSTGRES_PASSWORD: smartrag
      POSTGRES_DB: smartrag
    ports:
      - "5432:5432"
    volumes:
      - smartrag_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartrag -d smartrag"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  smartrag_pg_data:

